  name: Deploy                                                                  
                                                                                
  on:                                                                           
    push:                                                                       
      branches:                                                                 
        - master                                                                
                                                                                
  jobs:
    deploy:                                                                     
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
                                                                                
        - name: Install & Build
          run: npm ci && npm run build                                          
                  
        - name: Deploy
          run: |
            rm -rf /var/www/os.m1ngdaxie.com/*
            cp -r dist/* /var/www/os.m1ngdaxie.com/     